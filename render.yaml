services:
  - type: web
    name: whatsapp-agent-tecnimoove
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: auth-storage
      mountPath: /opt/render/project/src/auth_info
      sizeGB: 1
